kind = "web"
previewPath = "/"
title = "Digital Studio"
version = "1.0.0"
id = "artifacts/studio-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23779

[services.development]
run = "pnpm --filter @workspace/studio-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio-site", "run", "build" ]
publicDir = "artifacts/studio-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23779"
BASE_PATH = "/"
